<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>小学练习</title>
    <style>
      :root {
        color-scheme: light;
        --ink: #253044;
        --muted: #667085;
        --line: #d8dde8;
        --pink: #f56f9b;
        --sky: #36a3e8;
        --yellow: #f5c84c;
        --purple: #7357d8;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        color: var(--ink);
        font-family: "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", Arial, sans-serif;
        background:
          linear-gradient(90deg, rgba(245, 111, 155, 0.14) 0 12px, transparent 12px 28px),
          linear-gradient(135deg, #fff8df 0%, #edf7ff 50%, #f3f0ff 100%);
      }

      main {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 28px;
      }

      .home {
        width: min(760px, 100%);
        padding: clamp(22px, 4vw, 36px);
        border: 1px solid rgba(216, 221, 232, 0.92);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.9);
        box-shadow: 0 22px 60px rgba(35, 48, 68, 0.14);
        overflow: hidden;
        position: relative;
      }

      .home::before {
        content: "";
        position: absolute;
        inset: 0 0 auto 0;
        height: 10px;
        background: linear-gradient(90deg, var(--pink), var(--yellow), var(--sky), var(--purple));
      }

      h1 {
        margin: 0 0 22px;
        font-size: clamp(38px, 7vw, 64px);
        letter-spacing: 0;
        line-height: 1.05;
      }

      .practice-link {
        display: block;
        padding: 18px;
        margin-top: 14px;
        color: inherit;
        text-decoration: none;
        border: 2px solid #d9e5ff;
        border-radius: 8px;
        background: #f7faff;
      }

      .practice-link:hover,
      .practice-link:focus-visible {
        border-color: var(--sky);
        outline: 4px solid rgba(54, 163, 232, 0.18);
      }

      .practice-link strong {
        display: block;
        margin-bottom: 6px;
        font-size: 28px;
        line-height: 1.1;
      }

      .practice-link span {
        display: block;
        color: var(--muted);
        font-size: 18px;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <main>
      <section class="home" aria-labelledby="page-title">
        <h1 id="page-title">小学练习</h1>
        <a class="practice-link" href="arithmetic/">
          <strong>20 以内加减法</strong>
          <span>每天 10 题，练凑十、拆十和错题复习。</span>
        </a>
        <a class="practice-link" href="vertical/">
          <strong>竖式计算</strong>
          <span>两位数加减法，练个位、十位和进退位。</span>
        </a>
        <a class="practice-link" href="clock/">
          <strong>认识时钟</strong>
          <span>看时针和分针，选择小时和分钟。</span>
        </a>
      </section>
    </main>
  </body>
</html>
